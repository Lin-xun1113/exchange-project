# Minimal OTel Collector configuration.
# Receives OTLP (gRPC + HTTP) and forwards to Jaeger.
# This is optional — services export OTLP directly to Jaeger by default.
# Teams that want Collector-based routing (e.g., fan-out to multiple backends)
# can enable this by adding a collector service to docker-compose.yml.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
