syntax = "proto3";

package order.v1;

option go_package = "github.com/linxun2025/exchange-project/api/gen/order/v1;orderpb";

import "google/protobuf/timestamp.proto";

// 订单服务定义
service OrderService {
    // 创建订单
    rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
    // 取消订单
    rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
    // 获取订单
    rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
    // 订单列表
    rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
    // 更新订单状态（撮合引擎调用）
    rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
}

// 订单方向
enum OrderSide {
    ORDER_SIDE_UNSPECIFIED = 0;
    ORDER_SIDE_BUY = 1;
    ORDER_SIDE_SELL = 2;
}

// 订单类型
enum OrderType {
    ORDER_TYPE_UNSPECIFIED = 0;
    ORDER_TYPE_LIMIT = 1;
    ORDER_TYPE_MARKET = 2;
}

// 订单状态
enum OrderStatus {
    ORDER_STATUS_UNSPECIFIED = 0;
    ORDER_STATUS_PENDING = 1;           // 待撮合
    ORDER_STATUS_PARTIAL_FILLED = 2;    // 部分成交
    ORDER_STATUS_FILLED = 3;            // 完全成交
    ORDER_STATUS_CANCELLED = 4;         // 已取消
    ORDER_STATUS_REJECTED = 5;          // 已拒绝
}

// 订单信息
message Order {
    int64 id = 1;
    string order_id = 2;
    int64 user_id = 3;
    string symbol = 4;
    OrderSide side = 5;
    OrderType order_type = 6;
    string price = 7;
    string quantity = 8;
    string filled_quantity = 9;
    string remaining_quantity = 10;
    OrderStatus status = 11;
    google.protobuf.Timestamp created_at = 12;
    google.protobuf.Timestamp updated_at = 13;
}

// 创建订单请求
message CreateOrderRequest {
    int64 user_id = 1;
    string symbol = 2;
    OrderSide side = 3;
    OrderType order_type = 4;
    string price = 5;
    string quantity = 6;
    string idempotency_key = 7;  // 幂等键
}

// 创建订单响应
message CreateOrderResponse {
    Order order = 1;
}

// 取消订单请求
message CancelOrderRequest {
    string order_id = 1;
    int64 user_id = 2;  // 验证订单属于该用户
}

// 取消订单响应
message CancelOrderResponse {
    bool success = 1;
    Order order = 2;
}

// 获取订单请求
message GetOrderRequest {
    string order_id = 1;
}

// 获取订单响应
message GetOrderResponse {
    Order order = 1;
}

// 订单列表请求
message ListOrdersRequest {
    int64 user_id = 1;
    string symbol = 2;
    OrderStatus status = 3;
    int32 page = 4;
    int32 page_size = 5;
}

// 订单列表响应
message ListOrdersResponse {
    repeated Order orders = 1;
    int64 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

// 更新订单状态请求（撮合引擎内部调用）
message UpdateOrderStatusRequest {
    string order_id = 1;
    OrderStatus status = 2;
    string filled_quantity = 3;
}

// 更新订单状态响应
message UpdateOrderStatusResponse {
    bool success = 1;
    Order order = 2;
}
