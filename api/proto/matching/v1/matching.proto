syntax = "proto3";

package matching.v1;

option go_package = "github.com/linxun2025/exchange-project/api/gen/matching/v1;matchingpb";

import "google/protobuf/timestamp.proto";

// 撮合服务定义（内部服务，不对外暴露）
service MatchingService {
    // 提交订单进行撮合
    rpc SubmitOrder(SubmitOrderRequest) returns (SubmitOrderResponse);
    // 获取订单簿快照
    rpc GetOrderBook(GetOrderBookRequest) returns (GetOrderBookResponse);
    // 获取交易历史
    rpc GetTrades(GetTradesRequest) returns (GetTradesResponse);
}

// 订单方向
enum OrderSide {
    ORDER_SIDE_UNSPECIFIED = 0;
    ORDER_SIDE_BUY = 1;
    ORDER_SIDE_SELL = 2;
}

// 交易信息
message Trade {
    string trade_id = 1;
    string buy_order_id = 2;
    string sell_order_id = 3;
    string symbol = 4;
    string price = 5;
    string quantity = 6;
    int64 buy_user_id = 7;
    int64 sell_user_id = 8;
    google.protobuf.Timestamp created_at = 9;
}

// 订单簿条目
message OrderBookEntry {
    string price = 1;
    string quantity = 2;
    int32 order_count = 3;
}

// 订单簿快照
message OrderBook {
    string symbol = 1;
    repeated OrderBookEntry bids = 2;  // 买单（价格降序）
    repeated OrderBookEntry asks = 3;  // 卖单（价格升序）
    google.protobuf.Timestamp timestamp = 4;
}

// 提交订单请求
message SubmitOrderRequest {
    string order_id = 1;
    int64 user_id = 2;
    string symbol = 3;
    OrderSide side = 4;
    string price = 5;
    string quantity = 6;
}

// 提交订单响应
message SubmitOrderResponse {
    bool success = 1;
    repeated Trade trades = 2;
    string remaining_quantity = 3;  // 剩余未成交数量
}

// 获取订单簿请求
message GetOrderBookRequest {
    string symbol = 1;
    int32 depth = 2;  // 深度
}

// 获取订单簿响应
message GetOrderBookResponse {
    OrderBook order_book = 1;
}

// 获取交易历史请求
message GetTradesRequest {
    string symbol = 1;
    int64 limit = 2;
    string cursor = 3;  // 用于分页
    int64 user_id = 4;  // 可选：按用户过滤
    string order_id = 5;  // 可选：按订单过滤
}

// 获取交易历史响应
message GetTradesResponse {
    repeated Trade trades = 1;
    string next_cursor = 2;
    bool has_more = 3;
}
